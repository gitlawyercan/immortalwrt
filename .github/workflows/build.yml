name: ImmortalWrt-x86_64-N2800

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev file wget

    - name: Update feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config
      run: |
        cp config/x86_64_n2800.config .config
        make defconfig

    - name: Download packages
      run: |
        make download -j8

    - name: Compile firmware
      run: |
        make -j1 || make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-x86_64
        path: bin/targets/x86/64/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: immortalwrt-x86-${{ github.run_number }}
        name: ImmortalWrt x86_64 N2800
        files: bin/targets/x86/64/*